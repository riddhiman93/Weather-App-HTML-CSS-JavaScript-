<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weatherStyle.css">
</head>
<body>
    <div class="container">
        <div class="weatherWindow">
            <header>
                <h1 class="header">Weather App</h1>
                <p class="subHeader">Get the latest weather updates for your location</p>
            </header>
            <div class="input">
                <input type="text" id="city" class="location" placeholder="Enter City name...">
                <input type="submit" class="submitbtn" id="btn">
            </div>
            <div class="Report">
                <h2>Weather Report</h2>
                <p id="cityname" class="weatherinfo1">City:</p>
                <p id="temp" class="weatherinfo">Temperature:</p>
                <p id="maxMin" class="weatherinfo">Max / Min:</p>
                <p id="feelsLike" class="weatherinfo">Feels Like:</p>
                <p id="humidity" class="weatherinfo">Humidity:</p>
                <p id="desc" class="weatherinfo2">Description:</p>
            </div>
        </div>
    </div>   
    <h4 class="credit">Built By Riddhiman Dutta</h4> 
</body>
<script src="weatherScript.js"></script>
</html>
